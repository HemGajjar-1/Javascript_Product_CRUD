<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar bg-dark navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container d-flex justify-content-center align-items-center">
            <img src="Images/apple_logo.png" style="max-width: 6vh; max-height: 6vh;" class="me-1" alt="">
            <h1 class="text-light ">iManage</h1>
        </div>
    </nav>

    <div class="container-fluid py-3 px-3 px-md-5">
        <div class="modal fade" id="deleteModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered modal-sm modal-md">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Confirm Delete</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        Are you sure you want to delete this product?
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-dark" data-bs-dismiss="modal">
                            Cancel
                        </button>
                        <button type="button" id="confirmDeleteBtn" class="btn btn-dark">
                            Delete
                        </button>
                    </div>

                </div>
            </div>
        </div>
        <div id="alert-container">
        </div>
        <div class="row my-2">
            <div class="col-12">
                <input type="text" id="searchInput" class="form-control border border-1 border-dark"
                    placeholder="Search Product">
            </div>
        </div>
        <div class="row align-items-center g-2 my-2">


            <div class="col-12 col-md-3">
                <button type="button" class="btn btn-dark w-100" onclick="goToAdd()">
                    Add Product
                </button>
            </div>


            <div class="col-12 col-md-9">
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <span class="fw-semibold">Sort By:</span>

                    <button type="button" class="btn btn-outline-dark btn-sm" onclick="sortProducts('id')">
                        ID
                    </button>

                    <button type="button" class="btn btn-outline-dark btn-sm" onclick="sortProducts('name')">
                        Name
                    </button>

                    <button type="button" class="btn btn-outline-dark btn-sm" onclick="sortProducts('price')">
                        Price
                    </button>
                </div>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered border-dark text-center">
                <thead>
                    <tr>
                        <th role="button" scope="col">ID</th>
                        <th scope="col">Image</th>
                        <th scope="col" role="button">Name</th>
                        <th scope="col " class="text-wrap">Description</th>
                        <th scope="col" role="button">Price</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">

                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./JS/myscript.js"></script>
    <script src="./JS/deleteProduct.js"></script>
</body>

</html>
