<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="CSS/mystyle.css">
</head>

<body>
    <nav class="navbar bg-dark navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container d-flex justify-content-center align-items-center">
            <img src="Images/apple_logo.png" style="max-width: 5.5vh; max-height: 5.5vh;" class="me-1" alt="">
            <h1 class="text-light ">iManage</h1>
        </div>
    </nav>
    <div class="container my-4">
        <h1 class="text-center">Add Product</h1>
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <div class="border border-2 border-dark rounded-4 p-4">
                    <div id="alert-container">
                    </div>
                    <form id="productForm" novalidate>
                        <div class="mb-3">
                            <label for="p_name" class="form-label">
                                Product Name
                            </label>
                            <input type="text" class="form-control shadow-none border border-dark rounded-2" id="p_name"
                                placeholder="Enter Product Name" required>
                            <span class="p-name-error d-block pt-1 text-danger"></span>
                        </div>
                        <div class="mb-3">
                            <label for="p_img" class="form-label">
                                Product Image URL
                            </label>
                            <div class="d-flex flex-column">
                                <div class="">
                                    <input class="form-control shadow-none border border-dark rounded-2" type="file"
                                        id="formFile">
                                </div>
                                <span class="p-img-error d-block pt-1 text-danger"></span>
                                <img id="imagePreview" src="/ProductImage/demo.jpg" class="img-thumbnail d-none"
                                    style="height:150px;width: 170px;margin: auto;">
                            </div>
                        </div>
                        <div class="mb-3 text-center">
                        </div>
                        <div class="mb-3">
                            <label for="p_price" class="form-label">
                                Product Price
                            </label>
                            <div class="input-group">
                                <span class="input-group-text border border-dark ">₹</span>
                                <input type="number" class="form-control shadow-none border border-dark " id="p_price"
                                    placeholder="Enter Price" min="0" required>
                            </div>
                            <span class="p-price-error d-block pt-1 text-danger"></span>
                        </div>
                        <div class="mb-3">
                            <label for="p_desc" class="form-label">
                                Product Description
                            </label>
                            <textarea class="form-control shadow-none border border-dark " id="p_desc" rows="3"
                                placeholder="Enter Product Description" required></textarea>
                            <span class="p-desc-error d-block pt-1 text-danger"></span>
                        </div>
                        <div class="d-flex flex-column flex-sm-row justify-content-between gap-2">
                            <a href="index.html" class="btn btn-dark">
                                Cancel
                            </a>
                            <button type="submit" class="btn btn-dark">
                                Save Product
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./JS/myscript.js"></script>
    <script src="./JS/addProduct.js"></script>
</body>

</html>
